{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error</title>

<style>
:root {
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --bg-dark:#0f172a;
  --card:rgba(30,41,59,.78);
  --text:#e2e8f0;
  --text-muted:#94a3b8;
}

body{
  min-height:100vh;
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background: var(--bg-dark) url('https://thumbs.dreamstime.com/b/futuristic-neon-wireframe-padlock-symbolizing-cybersecurity-data-encryption-privacy-digital-network-rendered-glowing-blue-426921878.jpg') no-repeat center center fixed;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text);
}

/* glass card */
.error-card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid rgba(99,102,241,.25);
  border-radius:1.25rem;
  padding:2.5rem 2rem;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 25px 60px -12px rgba(0,0,0,.65);
}

.error-card:hover{
  transform:translateY(-6px);
  box-shadow:0 30px 70px -12px rgba(99,102,241,.25);
}

/* title */
.error-card h2{
  font-size:1.8rem;
  font-weight:700;
  margin-bottom:.8rem;
  background:linear-gradient(90deg,#f87171,#fb7185,#f43f5e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* message */
.error-card p{
  color:var(--text-muted);
  margin-bottom:1.6rem;
  font-size:.95rem;
}

/* button */
.btn-home{
  display:inline-block;
  padding:.8rem 1.3rem;
  border-radius:.7rem;
  font-weight:600;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,var(--primary),var(--primary-dark));
}

.btn-home:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px -10px rgba(99,102,241,.55);
}
</style>

</head>

<body>

<div class="error-card">

<h2>Oops! Something went wrong</h2>

<p>{{ message }}</p>

<a href="{% url 'index' %}" class="btn-home">
Go back home
</a>

</div>

</body>
</html>
