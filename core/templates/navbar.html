
<style>
    :root{
    --primary:#6366f1;
    --primary-dark:#4f46e5;
    }

    /* base navbar button */
    .nav-btn{
    padding:.45rem .9rem;
    border-radius:.6rem;
    font-weight:500;
    font-size:.9rem;
    color:white;
    text-decoration:none;
    transition:.25s;
    border:none;
    }

    /* HOME */
    .btn-home{
    background:linear-gradient(90deg,#f59e0b,#d97706);
    }
    .btn-home:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(245,158,11,.4);
    }

    /* UPLOAD */
    .btn-upload-nav{
    background:linear-gradient(90deg,var(--primary),var(--primary-dark));
    }
    .btn-upload-nav:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(99,102,241,.45);
    }

    /* LOGIN */
    .btn-login{
    background:linear-gradient(90deg,#3b82f6,#2563eb);
    }
    .btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(59,130,246,.45);
    }

    /* REGISTER */
    .btn-register{
    background:linear-gradient(90deg,#ef4444,#dc2626);
    }
    .btn-register:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(239,68,68,.45);
    }

    /* LOGOUT */
    .btn-logout{
    background:linear-gradient(90deg,#f43f5e,#be123c);
    }
    .btn-logout:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(244,63,94,.45);
    }
</style>


<nav class="navbar navbar-expand-lg navbar-dark mb-3">
<div class="container-fluid">

<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-between" id="navbarNav">

<ul class="navbar-nav gap-2">

<li class="nav-item">
<a href="{% url 'index' %}" class="nav-btn btn-home">Home</a>
</li>

{% if user.is_authenticated %}

<li class="nav-item">
<a href="{% url 'file_upload' %}" class="nav-btn btn-upload-nav">Upload</a>
</li>

<li class="nav-item">
<a href="{% url 'logout' %}" class="nav-btn btn-logout">Logout</a>
</li>

{% else %}

<li class="nav-item">
<a href="{% url 'login' %}" class="nav-btn btn-login">Login</a>
</li>

<li class="nav-item">
<a href="{% url 'register' %}" class="nav-btn btn-register">Register</a>
</li>

{% endif %}

</ul>

<ul class="navbar-nav ms-auto">
{% if user.is_authenticated %}
<li class="nav-item mt-2 mt-lg-0">
<span class="nav-link text-white">
Hi! <strong>{{ user.username }}</strong>
</span>
</li>
{% endif %}
</ul>

</div>
</div>
</nav>
